name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          PYTHONPATH: .
          ENCRYPTION_KEY: ci-test-encryption-key
          OAUTH_STATE_SECRET: ci-test-oauth-secret
          ADMIN_TOKEN: ci-test-admin
          APP_ENV: dev
        run: pytest tests/ -v

  firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firestore-rules-tests/package-lock.json

      - name: Install rules test dependencies
        working-directory: firestore-rules-tests
        run: npm ci

      - name: Run Firestore security rules tests
        working-directory: firestore-rules-tests
        run: npm run test:rules
