name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Create Firebase credentials file from secret
      - name: Set up Firebase credentials
        run: |
          echo "${{ secrets.FIREBASE_CREDENTIALS_JSON }}" > firebase_credentials.json

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          IMAGE_TAG=fastapi-backend:$(date +%s)
          docker build \
            --file Dockerfile \
            --build-arg FIREBASE_CREDENTIALS_FILE=firebase_credentials.json \
            --tag $IMAGE_TAG .
